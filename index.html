<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zheng Cai · zigzagcai</title>
  <meta name="description" content="Zheng Cai (zigzagcai) — working on self-evolving agentic systems, towards recursive superintelligence." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>😁</text></svg>" />
  <style>
    :root {
      --bg: #fbfbfa;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #2563eb;
      --line: #e6e6e3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --fg: #e8e8e6;
        --muted: #9a9a9a;
        --accent: #6ea8fe;
        --line: #23262e;
      }
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: 100%;
      max-width: 38rem;
    }
    .eyebrow {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.25rem;
    }
    h1 .nick {
      color: var(--muted);
      font-weight: 400;
    }
    .intro {
      font-size: clamp(1.05rem, 2.5vw, 1.3rem);
      margin: 1.5rem 0 0;
    }
    .intro .accent { color: var(--accent); font-weight: 600; }
    nav {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    nav a {
      color: var(--fg);
      text-decoration: none;
      font-size: 0.95rem;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    nav a:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Hi, I am</p>
    <h1>Zheng Cai <span class="nick">/ zigzagcai</span></h1>
    <p class="intro">
      I learn from the open-source community and try to build
      <span class="accent">self-evolving agentic systems</span>,
      towards the goal of <span class="accent">recursive superintelligence</span>.
    </p>
    <nav>
      <a href="https://github.com/zigzagcai">GitHub</a>
    </nav>
  </main>
</body>
</html>
